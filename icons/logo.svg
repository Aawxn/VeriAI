<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A"/>
      <stop offset="100%" style="stop-color:#1B2D3D"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#0099CC"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0099CC;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00D4FF" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="26" ry="26" fill="url(#bg)" stroke="url(#accent)" stroke-width="2"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="4" y1="30" x2="124" y2="30" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="4" y1="56" x2="124" y2="56" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="4" y1="82" x2="124" y2="82" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="4" y1="108" x2="124" y2="108" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="30" y1="4" x2="30" y2="124" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="56" y1="4" x2="56" y2="124" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="82" y1="4" x2="82" y2="124" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="108" y1="4" x2="108" y2="124" stroke="#00D4FF" stroke-width="0.5"/>
  </g>

  <!-- Glow circle behind shield -->
  <circle cx="64" cy="60" r="36" fill="url(#glow)"/>

  <!-- Shield body -->
  <path d="M64 22 L94 36 L94 62 C94 82 78 96 64 102 C50 96 34 82 34 62 L34 36 Z"
        fill="none" stroke="url(#accent)" stroke-width="3" stroke-linejoin="round" filter="url(#shadow)"/>

  <!-- Inner shield fill (subtle) -->
  <path d="M64 26 L90 38 L90 62 C90 80 76 92 64 98 C52 92 38 80 38 62 L38 38 Z"
        fill="#00D4FF" opacity="0.08"/>

  <!-- Checkmark inside shield -->
  <polyline points="48,60 58,72 80,46" fill="none" stroke="#00D4FF" stroke-width="4.5"
            stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>

  <!-- Chain links (CoT representation) below shield -->
  <g opacity="0.7">
    <!-- Left link -->
    <ellipse cx="44" cy="108" rx="8" ry="5" fill="none" stroke="#00D4FF" stroke-width="1.8"/>
    <!-- Center link (overlapping) -->
    <ellipse cx="56" cy="108" rx="8" ry="5" fill="none" stroke="#00D4FF" stroke-width="1.8"/>
    <!-- Right link -->
    <ellipse cx="68" cy="108" rx="8" ry="5" fill="none" stroke="#00D4FF" stroke-width="1.8"/>
    <!-- Far right link -->
    <ellipse cx="80" cy="108" rx="8" ry="5" fill="none" stroke="#00D4FF" stroke-width="1.8"/>
  </g>

  <!-- "V" lettermark accent on shield top -->
  <text x="64" y="18" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10"
        font-weight="800" fill="#00D4FF" letter-spacing="1">VERI</text>
</svg>
