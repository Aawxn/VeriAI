<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Ethics Monitor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 400px;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      overflow: hidden;
    }

    .popup-container {
      background: linear-gradient(145deg, #1a1a1a 0%, #2d2d2d 100%);
      border: 1px solid #333;
      border-radius: 12px;
      margin: 0;
      padding: 0;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }

    /* Loading State */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      gap: 16px;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #333;
      border-top: 2px solid #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 13px;
      color: #888;
      font-weight: 400;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
      opacity: 0.3;
    }

    .header-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      font-size: 20px;
      background: rgba(255, 255, 255, 0.2);
      padding: 8px;
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }

    .logo-text {
      flex: 1;
    }

    .logo-title {
      font-size: 16px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.3px;
    }

    .logo-subtitle {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 400;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
      animation: pulse 2s infinite;
    }

    .status-indicator.active {
      background: #00ff88;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Main Content */
    .main-content {
      padding: 20px 16px;
    }

    .status-section {
      margin-bottom: 20px;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .status-title {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .status-subtitle {
      font-size: 12px;
      color: #888;
      line-height: 1.4;
    }

    /* Platforms */
    .platforms-section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .platform-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .platform-item:last-child {
      border-bottom: none;
    }

    .platform-name {
      font-size: 13px;
      font-weight: 500;
      color: #ffffff;
    }

    .platform-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .platform-status.active {
      background: rgba(0, 255, 136, 0.2);
      color: #00ff88;
      border: 1px solid rgba(0, 255, 136, 0.3);
    }

    .platform-status.inactive {
      background: rgba(136, 136, 136, 0.2);
      color: #888;
      border: 1px solid rgba(136, 136, 136, 0.3);
    }

    /* Actions */
    .actions-section {
      display: flex;
      gap: 8px;
    }

    .action-button {
      flex: 1;
      padding: 10px 12px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 8px;
      color: #00d4ff;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .action-button:hover {
      background: rgba(0, 212, 255, 0.2);
      border-color: rgba(0, 212, 255, 0.5);
      transform: translateY(-1px);
    }

    .action-button.primary {
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      border-color: #00d4ff;
      color: white;
    }

    .action-button.primary:hover {
      background: linear-gradient(135deg, #00b8e6 0%, #0088bb 100%);
      box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
    }

    /* Neural Network Animation */
    .neural-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.1;
      z-index: -1;
    }

    .neural-node {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #00d4ff;
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.3);
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="neural-bg">
    <div class="neural-node" style="top: 20%; left: 10%; animation-delay: 0s;"></div>
    <div class="neural-node" style="top: 60%; left: 80%; animation-delay: 1s;"></div>
    <div class="neural-node" style="top: 80%; left: 30%; animation-delay: 2s;"></div>
    <div class="neural-node" style="top: 40%; left: 70%; animation-delay: 3s;"></div>
  </div>
  <div id="root"></div>
</body>
</html>
